<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>乐高盲文挂件 - 制作你的专属作品</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Alibaba PuHuiTi 3';
            src: url('https://aligitlab.oss-cn-shanghai.aliyuncs.com/fonts/AlibabaPuHuiTi-3/AlibabaPuHuiTi-3-Regular/AlibabaPuHuiTi-3-Regular.woff2') format('woff2'),
                 url('https://aligitlab.oss-cn-shanghai.aliyuncs.com/fonts/AlibabaPuHuiTi-3/AlibabaPuHuiTi-3-Regular/AlibabaPuHuiTi-3-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }
        
        @font-face {
            font-family: 'Alibaba PuHuiTi 3';
            src: url('https://aligitlab.oss-cn-shanghai.aliyuncs.com/fonts/AlibabaPuHuiTi-3/AlibabaPuHuiTi-3-Bold/AlibabaPuHuiTi-3-Bold.woff2') format('woff2'),
                 url('https://aligitlab.oss-cn-shanghai.aliyuncs.com/fonts/AlibabaPuHuiTi-3/AlibabaPuHuiTi-3-Bold/AlibabaPuHuiTi-3-Bold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Level 1: Enter English Word (Chinese) -->
        <section id="level1-zh" class="level-section active">
            <h2>请输入英文单词</h2>
            <p>请输入一个 1-5 个字母的英文单词</p>
            <div class="input-container">
                <input type="text" id="wordInputZh" maxlength="5" placeholder="输入单词..." autocomplete="off">
                <span id="charCountZh">0/5</span>
            </div>
            <div id="inputErrorZh" class="error-message"></div>
            <button id="startLevel2BtnZh" class="btn" disabled>确认</button>
        </section>

        <!-- Level 2: Learn Each Letter (Chinese) -->
        <section id="level2-zh" class="level-section">
            <div class="progress-bar">
                <div class="progress-info">
                    <span>字母进度：<strong id="letterProgressZh">0/0</strong></span>
                </div>
            </div>

            <div class="demo-container">
                <div class="demo-row">
                    <div class="big-letter" id="currentLetterBigZh">-</div>
                    <div class="braille-demo" id="brailleDemoZh">
                        <div class="matrix-cell">
                            <div class="matrix-column">
                                <div class="dot" data-dot="1"></div>
                                <div class="dot" data-dot="2"></div>
                                <div class="dot" data-dot="3"></div>
                            </div>
                            <div class="matrix-column">
                                <div class="dot" data-dot="4"></div>
                                <div class="dot" data-dot="5"></div>
                                <div class="dot" data-dot="6"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <button id="toggleDemoBtnZh" class="btn secondary" style="display: none;">显示/隐藏示范</button>
            </div>

            <div class="user-input-container">
                <p>请点击下方矩阵的点位来表示该字母的盲文：</p>
                <div class="braille-input" id="brailleInputZh">
                    <div class="matrix-cell interactive">
                        <div class="matrix-column">
                            <div class="dot clickable" data-dot="1"></div>
                            <div class="dot clickable" data-dot="2"></div>
                            <div class="dot clickable" data-dot="3"></div>
                        </div>
                        <div class="matrix-column">
                            <div class="dot clickable" data-dot="4"></div>
                            <div class="dot clickable" data-dot="5"></div>
                            <div class="dot clickable" data-dot="6"></div>
                        </div>
                    </div>
                </div>
                <div id="level2FeedbackZh" class="feedback-message"></div>
                <button id="checkLevel2BtnZh" class="btn">检查答案</button>
            </div>
        </section>

        <!-- Level 3: Memorize the Word (Chinese) -->
        <section id="level3-zh" class="level-section">
            <p>请依次输入单词 <strong id="targetWordZh">-</strong> 的盲文</p>
            <p class="hint">提示：从左到右依次输入每个字母的盲文点位</p>
            
            <div class="word-display">
                <div class="letter-slots" id="letterSlotsZh">
                </div>
            </div>

            <div class="user-input-container">
                <p>请点击下方矩阵输入当前字母：</p>
                <p>当前字母位置：<strong id="currentPositionZh">1</strong></p>
                <div class="braille-input" id="level3BrailleInputZh">
                    <div class="matrix-cell interactive">
                        <div class="matrix-column">
                            <div class="dot clickable" data-dot="1"></div>
                            <div class="dot clickable" data-dot="2"></div>
                            <div class="dot clickable" data-dot="3"></div>
                        </div>
                        <div class="matrix-column">
                            <div class="dot clickable" data-dot="4"></div>
                            <div class="dot clickable" data-dot="5"></div>
                            <div class="dot clickable" data-dot="6"></div>
                        </div>
                    </div>
                </div>
                <div id="level3FeedbackZh" class="feedback-message"></div>
                <button id="checkLevel3BtnZh" class="btn">确认</button>
            </div>
        </section>

        <!-- Level 4: Color Customization (Chinese) -->
        <section id="level4-zh" class="level-section">
            <h2>关卡 4：定制你的盲文乐高</h2>
            <p>请为每个字母选择颜色（蓝色、黄色、粉色），点击字母即可切换颜色</p>
            <p>当前单词：<strong id="level4WordZh">-</strong></p>
            
            <div class="color-customization">
                <div class="customization-slots" id="customizationSlotsZh">
                </div>
                
                <div class="color-options">
                    <p>可用颜色：</p>
                    <div class="color-circles">
                        <div class="color-circle color-blue" data-color="blue">蓝色</div>
                        <div class="color-circle color-yellow" data-color="yellow">黄色</div>
                        <div class="color-circle color-pink" data-color="pink">粉色</div>
                    </div>
                </div>
            </div>
            
            <div class="color-preview">
                <p>最终效果预览：</p>
                <div class="preview-slots" id="previewSlotsZh">
                </div>
            </div>
            
            <button id="confirmColorsBtnZh" class="btn">确认并生成</button>
        </section>

        <!-- Loading Screen (Chinese) -->
        <section id="loading-zh" class="level-section">
            <div class="loading-container">
                <div class="spinner"></div>
                <p class="loading-text">请制作属于你的专属乐高盲文挂件</p>
            </div>
        </section>

        <!-- Final Screen (Chinese) -->
        <section id="final-zh" class="level-section">
            <div class="final-content">
                <h2>恭喜完成！</h2>
                <div class="final-preview" id="finalPreviewZh">
                </div>
                <p class="final-message">你的专属盲文乐高已准备好！</p>
                <button id="restartBtnZh" class="btn">重新开始</button>
            </div>
        </section>
    </div>

    <script src="braille-db.js"></script>
    <script src="app.js"></script>
</body>
</html>
